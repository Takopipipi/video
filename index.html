<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SyncCinema Dark 🎥</title>
    <!-- Firebase & VK API -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://vk.com/js/api/videoplayer.js"></script>
    
    <style>
        :root {
            --bg: #0a0a0b;
            --panel: #161618;
            --accent: #8b5cf6;
            --text: #efeff1;
            --dim: #71717a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* HEADER */
        header {
            height: 50px;
            background: var(--panel);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            border-bottom: 1px solid #27272a;
        }
        .logo { font-weight: 700; color: var(--accent); letter-spacing: 1px; }

        /* MAIN */
        main { display: flex; flex: 1; overflow: hidden; }

        .player-side {
            flex: 3;
            display: flex;
            flex-direction: column;
            padding: 15px;
            gap: 15px;
            background: #000;
        }

        .video-container {
            flex: 1;
            position: relative;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #vk_player { width: 100%; height: 100%; border: none; }

        .controls {
            background: var(--panel);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input {
            background: #27272a;
            border: 1px solid #3f3f46;
            color: #fff;
            padding: 10px 15px;
            border-radius: 8px;
            flex: 1;
            outline: none;
        }
        input:focus { border-color: var(--accent); }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { opacity: 0.8; }

        /* CHAT */
        .chat-side {
            flex: 1;
            min-width: 320px;
            background: var(--panel);
            border-left: 1px solid #27272a;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 12px;
            font-size: 0.8rem;
            border-bottom: 1px solid #27272a;
            color: var(--dim);
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .m {
            padding: 8px 12px;
            border-radius: 12px;
            max-width: 85%;
            font-size: 0.9rem;
            line-height: 1.4;
        }
        .m.own { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 2px; }
        .m.other { align-self: flex-start; background: #27272a; border-bottom-left-radius: 2px; }
        .m-name { font-size: 0.7rem; color: var(--dim); margin-bottom: 2px; display: block; }

        .chat-input {
            padding: 15px;
            display: flex;
            gap: 8px;
            border-top: 1px solid #27272a;
        }

        /* MOBILE */
        @media (max-width: 768px) {
            main { flex-direction: column; overflow-y: auto; }
            .player-side { flex: none; height: 350px; padding: 5px; }
            .chat-side { flex: 1; min-height: 400px; border-left: none; }
            .controls { flex-direction: column; }
            .controls input { width: 100%; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">RAVE WEB CLONE 🍿</div>
    <div id="online-list" style="font-size: 11px; color: var(--dim);">Подключение...</div>
</header>

<main>
    <div class="player-side">
        <div class="video-container" id="player_box">
            <div style="height:100%; display:flex; align-items:center; justify-content:center; color:#3f3f46;">
                Вставьте ссылку на видео ВК ниже
            </div>
        </div>
        <div class="controls">
            <input type="text" id="nameInp" placeholder="Ваше имя" style="flex: 0 0 120px;">
            <input type="text" id="urlInp" placeholder="Ссылка на видео (vk.com/video-XXX_YYY)">
            <button onclick="setVideo()">Загрузить</button>
        </div>
    </div>

    <div class="chat-side">
        <div class="chat-header">СИНХРОННЫЙ ЧАТ</div>
        <div id="messages"></div>
        <div class="chat-input">
            <input type="text" id="msgInp" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()">➤</button>
        </div>
    </div>
</main>

<script>
    // 1. КОНФИГУРАЦИЯ (ВСТАВЬТЕ СВОИ ДАННЫЕ ИЗ FIREBASE)
    const firebaseConfig = {
        databaseURL: "https://watch-together-vk-default-rtdb.europe-west1.firebasedatabase.app/"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. ПЕРЕМЕННЫЕ
    const urlParams = new URLSearchParams(window.location.search);
    const roomId = urlParams.get('r') || Math.random().toString(36).substring(2, 7).toUpperCase();
    if (!urlParams.get('r')) window.history.replaceState({}, '', '?r=' + roomId);

    const roomRef = db.ref('rooms/' + roomId);
    let myId = 'u' + Math.random().toString(36).substring(2, 6);
    let myName = localStorage.getItem('cinemaName') || '';
    document.getElementById('nameInp').value = myName;

    let player = null;
    let isRemoteAction = false;

    // 3. ЛОГИКА ОНЛАЙНА
    function updatePresence() {
        myName = document.getElementById('nameInp').value.trim() || 'Гость';
        localStorage.setItem('cinemaName', myName);
        roomRef.child('users').child(myId).set({ name: myName, last: Date.now() });
    }
    roomRef.child('users').child(myId).onDisconnect().remove();
    roomRef.child('users').on('value', s => {
        const users = Object.values(s.val() || {}).map(u => u.name).join(', ');
        document.getElementById('online-list').textContent = 'В комнате: ' + users;
    });

    // 4. УПРАВЛЕНИЕ ВИДЕО И СИНХРОНИЗАЦИЕЙ
    function setVideo() {
        const url = document.getElementById('urlInp').value;
        const match = url.match(/video(-?\d+_\d+)/);
        if (match) {
            const vid = match[1].split('_');
            const embedUrl = `https://vk.com/video_ext.php?oid=${vid[0]}&id=${vid[1]}&api=1`; // api=1 важно!
            roomRef.child('sync').set({
                url: embedUrl,
                state: 'play',
                time: 0,
                by: myId
            });
            document.getElementById('urlInp').value = '';
        }
    }

    roomRef.child('sync').on('value', snap => {
        const data = snap.val();
        if (!data) return;

        // Если пришла новая ссылка - создаем плеер
        const currentIframe = document.querySelector('#vk_player');
        if (!currentIframe || currentIframe.src !== data.url) {
            document.getElementById('player_box').innerHTML = `<iframe id="vk_player" src="${data.url}" allow="autoplay; fullscreen" frameborder="0"></iframe>`;
            
            // Инициализация API плеера
            setTimeout(() => {
                player = VK.VideoPlayer(document.getElementById('vk_player'));
                
                // Подписываемся на события плеера
                player.subscribe('onPlay', () => handleLocalAction('play'));
                player.subscribe('onPause', () => handleLocalAction('pause'));
                player.subscribe('onSeek', (t) => handleLocalAction('seek', t));
            }, 1000);
        }

        // Если действие пришло от другого пользователя - выполняем
        if (data.by !== myId && player) {
            isRemoteAction = true;
            if (data.state === 'play') player.play();
            if (data.state === 'pause') player.pause();
            
            // Если разница во времени большая - мотаем
            player.getCurrentTime(t => {
                if (Math.abs(t - data.time) > 2) player.seek(data.time);
            });
            
            setTimeout(() => { isRemoteAction = false; }, 500);
        }
    });

    function handleLocalAction(action, time = null) {
        if (isRemoteAction || !player) return;
        
        player.getCurrentTime(t => {
            roomRef.child('sync').update({
                state: action === 'seek' ? 'play' : action,
                time: time !== null ? time : t,
                by: myId
            });
        });
    }

    // Регулярно обновляем время в базе (если мы инициатор), чтобы партнер мог синхрониться
    setInterval(() => {
        if (player && !isRemoteAction) {
            player.getCurrentTime(t => {
                roomRef.child('sync').child('time').set(t);
            });
        }
    }, 5000);

    // 5. ЧАТ
    function sendMsg() {
        const t = document.getElementById('msgInp').value.trim();
        if (!t || !myName) return;
        roomRef.child('messages').push({ n: myName, t: t, u: myId });
        document.getElementById('msgInp').value = '';
    }

    roomRef.child('messages').limitToLast(40).on('child_added', s => {
        const d = s.val();
        const div = document.createElement('div');
        div.className = `m ${d.u === myId ? 'own' : 'other'}`;
        div.innerHTML = `<span class="m-name">${d.n}</span>${d.t}`;
        const box = document.getElementById('messages');
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    });

    // Инициализация
    document.getElementById('nameInp').addEventListener('blur', updatePresence);
    if (myName) updatePresence();
</script>
</body>
</html>
