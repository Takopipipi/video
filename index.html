<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SyncCinema Mobile</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg: #000000;
            --panel: #1a1a1a;
            --accent: #7c4dff;
            --text: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ПЛЕЕР (ВСЕГДА СВЕРХУ) */
        .video-section {
            width: 100%;
            background: #000;
            aspect-ratio: 16 / 9;
            position: relative;
        }
        #player_box { width: 100%; height: 100%; }
        iframe { width: 100%; height: 100%; border: none; }

        /* УПРАВЛЕНИЕ (КОМПАКТНОЕ) */
        .controls {
            background: var(--panel);
            padding: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            border-bottom: 1px solid #333;
        }
        input {
            background: #333;
            border: 1px solid #444;
            color: #fff;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 12px;
            outline: none;
        }
        .url-input { flex: 1; min-width: 150px; }
        .name-input { width: 80px; }
        
        button {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        /* ЧАТ (ЗАНИМАЕТ ОСТАТОК ЭКРАНА) */
        .chat-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0a0a0a;
            overflow: hidden;
        }
        #online-label {
            font-size: 10px;
            color: #888;
            padding: 5px 10px;
            background: #111;
        }
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .m {
            max-width: 85%;
            padding: 6px 10px;
            border-radius: 10px;
            font-size: 13px;
            line-height: 1.4;
        }
        .m.own { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 2px; }
        .m.other { align-self: flex-start; background: #222; border-bottom-left-radius: 2px; }
        .m-n { font-size: 10px; opacity: 0.6; display: block; margin-bottom: 2px; }

        .chat-input-row {
            padding: 8px;
            display: flex;
            gap: 5px;
            background: var(--panel);
        }
        .chat-input-row input { flex: 1; }

        /* ИНСТРУКЦИЯ ДЛЯ УКРАИНЫ */
        .ua-hint {
            position: absolute;
            bottom: 5px;
            width: 100%;
            text-align: center;
            font-size: 9px;
            color: #ff4444;
            pointer-events: none;
        }

        /* ДЛЯ ПК */
        @media (min-width: 768px) {
            body { flex-direction: row; }
            .video-section { flex: 3; aspect-ratio: auto; }
            .chat-section { flex: 1; border-left: 1px solid #333; }
        }
    </style>
</head>
<body>

    <div class="video-section">
        <div id="player_box">
            <div style="height:100%; display:flex; align-items:center; justify-content:center; color:#444; font-size:12px;">
                Ожидание видео...
            </div>
        </div>
        <div class="ua-hint">Если экран черный (UA) - включите VPN/WARP</div>
    </div>

    <div class="chat-section">
        <div class="controls">
            <input type="text" id="nameInp" class="name-input" placeholder="Имя">
            <input type="text" id="urlInp" class="url-input" placeholder="Ссылка vk.com/video...">
            <button onclick="setVideo()">OK</button>
            <button onclick="syncPlayer()" style="background:#444">Синхрон</button>
        </div>

        <div id="online-label">Онлайн: ...</div>
        
        <div id="messages"></div>

        <div class="chat-input-row">
            <input type="text" id="msgInp" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()">➤</button>
        </div>
    </div>

<script>
    // 1. ТВОЙ ФАЙРБЕЙС (ВСТАВЬ ССЫЛКУ)
    const firebaseConfig = {
        databaseURL: "ВСТАВЬ_СЮДА_СВОЮ_ССЫЛКУ"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. КОМНАТА
    const urlParams = new URLSearchParams(window.location.search);
    const roomId = urlParams.get('r') || "ROOM1";
    if (!urlParams.get('r')) window.history.replaceState({}, '', '?r=' + roomId);

    const roomRef = db.ref('rooms/' + roomId);
    let myId = 'u' + Math.random().toString(36).substring(2, 6);
    let myName = localStorage.getItem('cName') || '';
    document.getElementById('nameInp').value = myName;

    // 3. ВИДЕО
    function setVideo() {
        const url = document.getElementById('urlInp').value;
        const match = url.match(/video(-?\d+_\d+)/);
        if (match) {
            const vid = match[1].split('_');
            const embed = `https://vk.com/video_ext.php?oid=${vid[0]}&id=${vid[1]}&hd=2&autoplay=1&js_api=1`;
            roomRef.child('video').set({ url: embed, time: 0, state: 'play' });
            document.getElementById('urlInp').value = '';
        }
    }

    roomRef.child('video').on('value', s => {
        const data = s.val();
        if (data) {
            const box = document.getElementById('player_box');
            // Обновляем плеер только если ссылка изменилась
            if (!box.innerHTML.includes(data.url)) {
                box.innerHTML = `<iframe id="v_ifr" src="${data.url}" allow="autoplay; fullscreen"></iframe>`;
            }
        }
    });

    // Ручной синхрон (если авто не срабатывает)
    function syncPlayer() {
        roomRef.child('video').once('value', s => {
            const data = s.val();
            const ifr = document.getElementById('v_ifr');
            if (ifr && data) {
                // Перезагружаем iframe с нужной позиции (ВК позволяет вешать t=123 в URL)
                const baseUrl = data.url.split('&t=')[0];
                ifr.src = baseUrl + "&t=" + Math.floor(data.time || 0);
            }
        });
    }

    // 4. ЧАТ
    function sendMsg() {
        const t = document.getElementById('msgInp').value.trim();
        myName = document.getElementById('nameInp').value.trim() || 'Гость';
        localStorage.setItem('cName', myName);
        if (!t) return;
        roomRef.child('messages').push({ n: myName, t: t, u: myId });
        document.getElementById('msgInp').value = '';
    }

    roomRef.child('messages').limitToLast(30).on('child_added', s => {
        const d = s.val();
        const div = document.createElement('div');
        div.className = `m ${d.u === myId ? 'own' : 'other'}`;
        div.innerHTML = `<span class="m-n">${d.n}</span>${d.t}`;
        const box = document.getElementById('messages');
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    });

    // 5. ОНЛАЙН СТАТУС
    function updatePresence() {
        const name = document.getElementById('nameInp').value || 'Гость';
        roomRef.child('users').child(myId).set({ name: name, last: Date.now() });
    }
    setInterval(updatePresence, 10000);
    roomRef.child('users').on('value', s => {
        const users = Object.values(s.val() || {}).map(u => u.name).join(', ');
        document.getElementById('online-label').textContent = 'В комнате: ' + users;
    });

</script>
</body>
</html>
