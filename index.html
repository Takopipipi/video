<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Кино-Комната 🎥</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1e1e1e;
            --accent-color: #7c4dff;
            --text-color: #e0e0e0;
            --msg-own: #4a148c;
            --msg-other: #333333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Шапка */
        header {
            background: var(--card-bg);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            z-index: 10;
        }

        .logo { color: var(--accent-color); font-weight: bold; font-size: 1.2rem; }
        
        .room-tag {
            font-size: 0.8rem;
            background: #333;
            padding: 4px 8px;
            border-radius: 4px;
        }

        /* Основной контейнер */
        main {
            display: flex;
            flex: 1;
            overflow: hidden;
            flex-direction: row;
        }

        /* Секция видео */
        .video-side {
            flex: 3;
            display: flex;
            flex-direction: column;
            padding: 15px;
            gap: 10px;
        }

        #videoWrapper {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        iframe { width: 100%; height: 100%; border: none; }

        .controls {
            display: flex;
            gap: 8px;
            background: var(--card-bg);
            padding: 10px;
            border-radius: 8px;
        }

        input[type="text"] {
            flex: 1;
            background: #2b2b2b;
            border: 1px solid #444;
            color: white;
            padding: 10px;
            border-radius: 6px;
            outline: none;
        }

        input:focus { border-color: var(--accent-color); }

        button {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Секция чата */
        .chat-side {
            flex: 1;
            background: var(--card-bg);
            display: flex;
            flex-direction: column;
            border-left: 1px solid #333;
            min-width: 320px;
        }

        .online-status {
            padding: 10px 15px;
            background: #252525;
            font-size: 0.85rem;
            border-bottom: 1px solid #333;
            color: #aaa;
        }

        .online-status b { color: var(--accent-color); }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            max-width: 85%;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 0.95rem;
            position: relative;
            line-height: 1.4;
        }

        .msg.own { align-self: flex-end; background: var(--msg-own); border-bottom-right-radius: 2px; }
        .msg.other { align-self: flex-start; background: var(--msg-other); border-bottom-left-radius: 2px; }

        .msg-info { font-size: 0.7rem; opacity: 0.6; margin-bottom: 3px; font-weight: bold; }
        .msg-time { font-size: 0.65rem; opacity: 0.4; text-align: right; margin-top: 3px; }

        .chat-input {
            padding: 15px;
            display: flex;
            gap: 8px;
            border-top: 1px solid #333;
        }

        /* Мобильная адаптация */
        @media (max-width: 768px) {
            main { flex-direction: column; overflow-y: auto; }
            .chat-side { flex: none; height: 500px; border-left: none; border-top: 1px solid #333; }
            .video-side { flex: none; }
            .controls { flex-wrap: wrap; }
            .controls input#nameInput { width: 100%; }
        }

        /* Уведомления */
        #toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--accent-color);
            padding: 10px 20px;
            border-radius: 5px;
            display: none;
            animation: fadeIn 0.3s;
            z-index: 100;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<header>
    <div class="logo">WATCH TOGETHER 🍿</div>
    <div class="room-tag" id="roomDisplay">Комната: ...</div>
</header>

<main>
    <div class="video-side">
        <div id="videoWrapper">
            <div style="display:flex; height:100%; align-items:center; justify-content:center; color:#666; text-align:center; padding:20px;">
                Здесь будет видео. Вставьте ссылку ниже 👇
            </div>
        </div>
        
        <div class="controls">
            <input type="text" id="nameInput" placeholder="Твоё имя..." maxlength="15">
            <input type="text" id="videoUrl" placeholder="Ссылка на видео ВК или vkvideo.ru">
            <button onclick="changeVideo()">🎬 Загрузить</button>
        </div>
    </div>

    <div class="chat-side">
        <div class="online-status" id="onlineUsers">👥 Подключение...</div>
        <div id="messages"></div>
        <div class="chat-input">
            <input type="text" id="msgInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()">➤</button>
        </div>
    </div>
</main>

<div id="toast"></div>

<script>
    // --- НАСТРОЙКИ FIREBASE ---
    const firebaseConfig = {
        databaseURL: "https://watch-together-vk-default-rtdb.europe-west1.firebasedatabase.app/"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- ЛОГИКА КОМНАТЫ ---
    const urlParams = new URLSearchParams(window.location.search);
    let roomId = urlParams.get('r') || Math.random().toString(36).substring(2, 7).toUpperCase();
    if (!urlParams.get('r')) window.history.replaceState({}, '', '?r=' + roomId);
    
    document.getElementById('roomDisplay').textContent = 'ID Комнаты: ' + roomId;

    let myId = localStorage.getItem('myId') || 'u' + Date.now();
    localStorage.setItem('myId', myId);

    let myName = localStorage.getItem('myName') || '';
    document.getElementById('nameInput').value = myName;

    const roomRef = db.ref('rooms/' + roomId);
    const videoRef = roomRef.child('video');
    const msgRef = roomRef.child('messages');
    const usersRef = roomRef.child('users');

    // --- ФУНКЦИИ ---

    // Обновление имени и статуса
    function updatePresence() {
        myName = document.getElementById('nameInput').value.trim() || 'Аноним';
        localStorage.setItem('myName', myName);
        usersRef.child(myId).set({
            name: myName,
            lastSeen: firebase.database.ServerValue.TIMESTAMP
        });
    }

    document.getElementById('nameInput').addEventListener('blur', updatePresence);
    usersRef.child(myId).onDisconnect().remove();

    // Список онлайн
    usersRef.on('value', (snap) => {
        const users = snap.val() || {};
        const names = Object.values(users).map(u => `<b>${escape(u.name)}</b>`).join(', ');
        document.getElementById('onlineUsers').innerHTML = `👥 Онлайн: ${names}`;
    });

    // Изменение видео
    function changeVideo() {
        if (!myName) return alert("Сначала введи имя!");
        const url = document.getElementById('videoUrl').value;
        const match = url.match(/video(-?\d+_\d+)/);
        
        if (match) {
            const videoId = match[1];
            const [oid, vid] = videoId.split('_');
            const embed = `https://vk.com/video_ext.php?oid=${oid}&id=${vid}&hd=2&autoplay=1`;
            videoRef.set({ url: embed, by: myName });
            document.getElementById('videoUrl').value = '';
        } else {
            alert("Неверная ссылка! Нужно что-то вроде: vk.com/video-123_456");
        }
    }

    // Слушатель видео
    videoRef.on('value', (snap) => {
        const data = snap.val();
        if (data) {
            document.getElementById('videoWrapper').innerHTML = `<iframe src="${data.url}" allow="autoplay; fullscreen"></iframe>`;
            showToast("🎬 Видео обновлено пользователем " + data.by);
        }
    });

    // Чат
    function sendMsg() {
        const txt = document.getElementById('msgInput').value.trim();
        if (!txt || !myName) return;
        msgRef.push({
            uid: myId,
            user: myName,
            text: txt,
            time: Date.now()
        });
        document.getElementById('msgInput').value = '';
    }

    msgRef.limitToLast(50).on('child_added', (snap) => {
        const m = snap.val();
        const isOwn = m.uid === myId;
        const div = document.createElement('div');
        div.className = `msg ${isOwn ? 'own' : 'other'}`;
        const time = new Date(m.time).toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
        
        div.innerHTML = `
            <div class="msg-info">${isOwn ? '' : escape(m.user)}</div>
            <div class="msg-text">${escape(m.text)}</div>
            <div class="msg-time">${time}</div>
        `;
        const container = document.getElementById('messages');
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    });

    // Вспомогательные функции
    function escape(s) {
        let t = document.createElement('div');
        t.textContent = s;
        return t.innerHTML;
    }

    function showToast(text) {
        const t = document.getElementById('toast');
        t.textContent = text;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    // Инициализация
    if (myName) updatePresence();
    setInterval(() => { if(myName) updatePresence(); }, 20000); // Heartbeat
</script>

</body>
</html>
