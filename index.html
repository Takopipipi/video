<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Local Sync Cinema 🍿</title>
    <!-- Плеер и Firebase -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #050505; --panel: #111; --accent: #7c4dff; --text: #eee; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* ЛОББИ */
        #lobby { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .card { background: var(--panel); padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; border: 1px solid #222; }
        input { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 10px; width: 100%; margin-bottom: 10px; outline: none; }
        button { background: var(--accent); color: #fff; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; transition: 0.2s; }

        /* ИНТЕРФЕЙС */
        #room-ui { display: none; flex-direction: column; height: 100%; }
        .top-bar { background: var(--panel); padding: 10px; border-bottom: 1px solid #222; display: flex; gap: 10px; align-items: center; justify-content: space-between; }
        
        .main { display: flex; flex: 1; overflow: hidden; }
        .video-side { flex: 3; background: #000; display: flex; flex-direction: column; justify-content: center; }
        .chat-side { flex: 1; min-width: 320px; background: #080808; border-left: 1px solid #222; display: flex; flex-direction: column; }
        
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .m { max-width: 85%; padding: 8px 12px; border-radius: 15px; font-size: 14px; }
        .m.own { align-self: flex-end; background: var(--accent); }
        .m.other { align-self: flex-start; background: #222; }

        .chat-input { padding: 10px; background: var(--panel); display: flex; gap: 5px; }
        .chat-input input { margin: 0; border-radius: 20px; }

        .btn-sm { width: auto; padding: 8px 15px; font-size: 12px; }

        @media (max-width: 768px) {
            .main { flex-direction: column; overflow-y: auto; }
            .chat-side { flex: none; height: 350px; width: 100%; }
            .video-side { aspect-ratio: 16/9; flex: none; }
        }
    </style>
</head>
<body>

    <div id="lobby">
        <div class="card">
            <h1 style="color:var(--accent); margin-bottom:20px">Cinema Sync 🍿</h1>
            <input type="text" id="userName" placeholder="Твоё имя">
            <button onclick="enterRoom('create')">Создать комнату</button>
            <div style="margin:10px; font-size:12px; color:#444">ИЛИ</div>
            <input type="text" id="joinId" placeholder="ID комнаты">
            <button style="background:#222" onclick="enterRoom('join')">Войти</button>
        </div>
    </div>

    <div id="room-ui">
        <div class="top-bar">
            <div>
                <input type="file" id="fileInp" accept="video/*" style="display:none" onchange="loadLocalFile(this.files[0])">
                <button onclick="document.getElementById('fileInp').click()" class="btn-sm">📁 Выбрать файл видео</button>
            </div>
            <div id="statusLabel" style="font-size:12px; color:#666">ID: ---</div>
        </div>

        <div class="main">
            <div class="video-side">
                <video id="player" playsinline controls></video>
                <div id="fileHint" style="position:absolute; width:100%; text-align:center; color:#333; pointer-events:none;">
                    Оба участника должны выбрать один и тот же файл
                </div>
            </div>
            <div class="chat-side">
                <div id="messages"></div>
                <div class="chat-input">
                    <input type="text" id="msgInp" placeholder="Чат..." onkeypress="if(event.key==='Enter') sendMsg()">
                    <button onclick="sendMsg()" style="width:auto; padding:0 15px">➤</button>
                </div>
            </div>
        </div>
    </div>

<script>
    // --- ТВОЙ FIREBASE ---
    const firebaseConfig = { databaseURL: "https://watch-together-vk-default-rtdb.europe-west1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myId = localStorage.getItem('cinema_uid') || 'u' + Math.random().toString(36).substring(2, 7);
    localStorage.setItem('cinema_uid', myId);
    
    let currentRoom = null;
    let isMaster = false;
    let player = new Plyr('#player', { title: 'Local Video', invertTime: false });
    let blockSync = false;

    function enterRoom(type) {
        const name = document.getElementById('userName').value.trim();
        if (!name) return alert("Введите имя!");
        localStorage.setItem('cinema_name', name);

        let rid = (type === 'create') ? Math.random().toString(36).substring(2, 7).toUpperCase() : document.getElementById('joinId').value.trim().toUpperCase();
        if (!rid) return;

        db.ref('rooms/' + rid).once('value', s => {
            if (type === 'create' || s.exists()) {
                if (type === 'create') db.ref('rooms/' + rid + '/meta').set({ owner: myId });
                startRoom(rid);
            } else { alert("Комната не найдена"); }
        });
    }

    function startRoom(rid) {
        currentRoom = db.ref('rooms/' + rid);
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('room-ui').style.display = 'flex';
        document.getElementById('statusLabel').textContent = "ID: " + rid;

        currentRoom.child('meta/owner').once('value', s => {
            isMaster = (s.val() === myId);
        });

        // Слушаем команды от Мастера
        currentRoom.child('state').on('value', s => {
            const data = s.val();
            if (!data || isMaster || blockSync) return;

            if (data.paused) player.pause(); else player.play();
            if (Math.abs(player.currentTime - data.time) > 2) player.currentTime = data.time;
        });

        // Мастер отправляет команды
        const sync = () => {
            if (isMaster && !blockSync) {
                currentRoom.child('state').update({ time: player.currentTime, paused: player.paused });
            }
        };

        player.on('play', sync);
        player.on('pause', sync);
        player.on('seeking', sync);
        setInterval(() => { if(isMaster && !player.paused) sync(); }, 3000);

        // Чат
        currentRoom.child('messages').limitToLast(50).on('child_added', s => {
            const d = s.val();
            const div = document.createElement('div');
            div.className = `m ${d.u === myId ? 'own' : 'other'}`;
            div.innerHTML = `<span style="font-size:10px;opacity:0.5;display:block">${d.n}</span>${d.t}`;
            const box = document.getElementById('messages');
            box.appendChild(div); box.scrollTop = box.scrollHeight;
        });
    }

    // Загрузка локального файла (без отправки на сервер)
    function loadLocalFile(file) {
        if (!file) return;
        const objectURL = URL.createObjectURL(file);
        player.source = { type: 'video', sources: [{ src: objectURL }] };
        document.getElementById('fileHint').style.display = 'none';
        
        if (isMaster) {
            currentRoom.child('messages').push({ n: 'СИСТЕМА', t: '🔥 Админ выбрал файл и готов к просмотру!', u: 'system' });
        }
    }

    function sendMsg() {
        const t = document.getElementById('msgInp').value.trim();
        const n = localStorage.getItem('cinema_name');
        if (t && currentRoom) currentRoom.child('messages').push({ n: n, t: t, u: myId });
        document.getElementById('msgInp').value = '';
    }

    const ridParam = new URLSearchParams(window.location.search).get('r');
    if (ridParam) { document.getElementById('joinId').value = ridParam; }
</script>
</body>
</html>
